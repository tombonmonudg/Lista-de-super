<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Familiar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: bold; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 pb-32 text-gray-800">
    <div class="max-w-md mx-auto">
        <div class="flex bg-white shadow-sm sticky top-0 z-30">
            <button id="tabLista" class="flex-1 py-4 text-center tab-active" onclick="cambiarTab('lista')">Lista Actual</button>
            <button id="tabHistorial" class="flex-1 py-4 text-center text-gray-500" onclick="cambiarTab('historial')">Historial</button>
        </div>

        <div class="p-4">
            <div id="seccionLista">
                <h1 class="text-2xl font-bold text-center mb-6">🛒 Mi Carrito</h1>
                
                <div class="bg-white p-4 rounded-lg shadow-md mb-6">
                    <input id="nombre" type="text" placeholder="Producto" class="w-full mb-2 p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    <div class="flex gap-2">
                        <input id="precio" type="number" step="0.01" placeholder="$ Precio" class="w-1/2 p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                        <input id="piezas" type="number" placeholder="Cant." class="w-1/2 p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <button id="btnAgregar" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg transition-all active:scale-95">
                        Agregar a la lista
                    </button>
                </div>

                <div id="listaContenedor" class="space-y-3">
                    </div>
            </div>

            <div id="seccionHistorial" class="hidden">
                <h1 class="text-2xl font-bold text-center mb-6">📜 Compras Pasadas</h1>
                <div id="historialContenedor" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <div id="barraInferior" class="fixed bottom-0 left-0 right-0 bg-white border-t p-5 flex justify-between items-center max-w-md mx-auto shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-20">
        <div>
            <p class="text-xs text-gray-400 uppercase font-black tracking-widest">Total</p>
            <p class="text-3xl font-black text-green-600" id="totalCuenta">$0.00</p>
        </div>
        <button id="btnGuardarCompra" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-2xl font-bold shadow-md transition-all active:scale-95">
            Guardar Compra
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // CONFIGURACIÓN DE FIREBASE (PEGA TUS DATOS AQUÍ)
        const firebaseConfig = {
            apiKey: "AIzaSyDtZUWQzwes7Z9cmNwgKImUfJtlo3SJ-hg",
            authDomain: "lista-de-super-30116.firebaseapp.com",
            projectId: "lista-de-super-30116",
            storageBucket: "lista-de-super-30116.firebasestorage.app",
            messagingSenderId: "686745242098",
            appId: "1:686745242098:web:a2612a5e2ea4f381e9836b",
            measurementId: "G-FRYK1VCS83"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colLista = collection(db, "lista_actual");
        const colHistorial = collection(db, "historial");

        // --- NAVEGACIÓN ---
        window.cambiarTab = (tab) => {
            const secLista = document.getElementById('seccionLista');
            const secHistorial = document.getElementById('seccionHistorial');
            const barra = document.getElementById('barraInferior');
            const btnL = document.getElementById('tabLista');
            const btnH = document.getElementById('tabHistorial');

            if(tab === 'lista') {
                secLista.classList.remove('hidden');
                secHistorial.classList.add('hidden');
                barra.classList.remove('hidden');
                btnL.classList.add('tab-active');
                btnH.classList.remove('tab-active');
            } else {
                secLista.classList.add('hidden');
                secHistorial.classList.remove('hidden');
                barra.classList.add('hidden');
                btnL.classList.remove('tab-active');
                btnH.classList.add('tab-active');
            }
        };

        // --- FUNCIONES DE LIMPIEZA ---
        const limpiarFormulario = () => {
            document.getElementById('nombre').value = '';
            document.getElementById('precio').value = '';
            document.getElementById('piezas').value = '';
            document.getElementById('nombre').focus();
        };

        // --- AGREGAR ITEM (REQUISITO: PERSISTENCIA Y LIMPIEZA) ---
        document.getElementById('btnAgregar').addEventListener('click', async () => {
            const nombre = document.getElementById('nombre').value;
            const precio = parseFloat(document.getElementById('precio').value);
            const piezas = parseInt(document.getElementById('piezas').value);

            if(nombre && !isNaN(precio) && !isNaN(piezas)) {
                try {
                    await addDoc(colLista, { 
                        nombre, 
                        precio, 
                        piezas, 
                        creado: Date.now() 
                    });
                    limpiarFormulario(); // Limpia al agregar
                } catch (e) {
                    console.error("Error al guardar:", e);
                    alert("No se pudo guardar. Revisa la conexión o las reglas de Firebase.");
                }
            }
        });

        // --- ESCUCHAR LISTA ACTUAL (TIEMPO REAL) ---
        onSnapshot(colLista, (snapshot) => {
            let total = 0;
            const contenedor = document.getElementById('listaContenedor');
            contenedor.innerHTML = '';

            snapshot.docs.forEach(itemDoc => {
                const item = itemDoc.data();
                const subtotal = item.precio * item.piezas;
                total += subtotal;

                contenedor.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 flex justify-between items-center animate-fade-in">
                        <div>
                            <p class="font-bold text-gray-800 uppercase text-sm">${item.nombre}</p>
                            <p class="text-xs text-gray-400">${item.piezas} pzas x $${item.precio}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold text-gray-700 text-lg">$${subtotal.toFixed(2)}</span>
                            <button onclick="eliminarItem('${itemDoc.id}')" class="text-red-300 hover:text-red-600 transition-colors p-2">
                                🗑️
                            </button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('totalCuenta').innerText = `$${total.toFixed(2)}`;
        });

        window.eliminarItem = async (id) => {
            await deleteDoc(doc(db, "lista_actual", id));
        };

        // --- HISTORIAL ---
        const qHistorial = query(colHistorial, orderBy("timestamp", "desc"));
        onSnapshot(qHistorial, (snapshot) => {
            const contenedorH = document.getElementById('historialContenedor');
            contenedorH.innerHTML = '';
            
            if(snapshot.empty) {
                contenedorH.innerHTML = '<p class="text-center text-gray-400 mt-10">No hay compras registradas.</p>';
                return;
            }

            snapshot.docs.forEach(docSnap => {
                const compra = docSnap.data();
                contenedorH.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow border border-gray-100">
                        <div class="flex justify-between items-center mb-2 border-b pb-2">
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${compra.fecha}</span>
                            <span class="text-xl font-black text-blue-600">$${compra.total.toFixed(2)}</span>
                        </div>
                        <details class="text-xs text-gray-600">
                            <summary class="cursor-pointer text-blue-400 font-bold py-1">Ver detalles de compra</summary>
                            <ul class="mt-2 space-y-1 bg-gray-50 p-2 rounded-lg">
                                ${compra.detalles.map(i => `<li>• ${i.piezas}x ${i.nombre} ($${i.precio})</li>`).join('')}
                            </ul>
                        </details>
                    </div>
                `;
            });
        });

        // --- GUARDAR COMPRA (REQUISITO: PERSISTENCIA HISTÓRICA) ---
        document.getElementById('btnGuardarCompra').addEventListener('click', async () => {
            const snapshot = await getDocs(colLista);
            if(snapshot.empty) return alert("La lista está vacía.");

            if(confirm('¿Finalizar y guardar compra?')) {
                const items = snapshot.docs.map(d => d.data());
                const total = items.reduce((acc, curr) => acc + (curr.precio * curr.piezas), 0);

                // Guardar en colección de historial
                await addDoc(colHistorial, {
                    fecha: new Date().toLocaleString('es-MX', { dateStyle: 'long', timeStyle: 'short' }),
                    timestamp: Date.now(),
                    total: total,
                    detalles: items
                });

                // Limpiar la lista actual en la nube
                const promesas = snapshot.docs.map(d => deleteDoc(doc(db, "lista_actual", d.id)));
                await Promise.all(promesas);

                limpiarFormulario(); // Limpia los campos al guardar
                alert("Compra guardada correctamente.");
            }
        });
    </script>
</body>
</html>
