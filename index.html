<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Familiar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: bold; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 pb-24 text-gray-800">
    <div class="max-w-md mx-auto">
        <div class="flex bg-white shadow-sm sticky top-0 z-30">
            <button id="tabLista" class="flex-1 py-4 text-center tab-active" onclick="cambiarTab('lista')">Lista Actual</button>
            <button id="tabHistorial" class="flex-1 py-4 text-center text-gray-500" onclick="cambiarTab('historial')">Historial</button>
        </div>

        <div class="p-4">
            <div id="seccionLista">
                <h1 class="text-2xl font-bold text-center mb-6 uppercase tracking-wider">🛒 Mi Carrito</h1>
                <div class="bg-white p-4 rounded-xl shadow-md mb-6 border border-gray-200">
                    <input id="nombre" type="text" placeholder="¿Qué vamos a comprar?" class="w-full mb-2 p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    <div class="flex gap-2">
                        <input id="precio" type="number" step="0.01" placeholder="$ Precio" class="w-1/2 p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                        <input id="piezas" type="number" placeholder="Cant." class="w-1/2 p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <button id="btnAgregar" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg transition-all active:scale-95">
                        Agregar a la lista
                    </button>
                    <button id="btnCancelarEdicion" class="hidden w-full mt-2 text-gray-500 text-sm font-semibold py-1">
                        Cancelar edición
                    </button>
                </div>
                <div id="listaContenedor" class="space-y-3"></div>
            </div>

            <div id="seccionHistorial" class="hidden">
                <h1 class="text-2xl font-bold text-center mb-6 uppercase tracking-wider">📜 Compras Pasadas</h1>
                <div id="historialContenedor" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="barraInferior" class="fixed bottom-0 left-0 right-0 bg-white border-t p-5 flex justify-between items-center max-w-md mx-auto shadow-2xl z-20">
        <div>
            <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest leading-none">Total estimado</p>
            <p class="text-3xl font-black text-green-600" id="totalCuenta">$0.00</p>
        </div>
        <button id="btnGuardarCompra" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-2xl font-bold shadow-md transition-all active:scale-95">
            Guardar
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtZUWQzwes7Z9cmNwgKImUfJtlo3SJ-hg",
            authDomain: "lista-de-super-30116.firebaseapp.com",
            projectId: "lista-de-super-30116",
            storageBucket: "lista-de-super-30116.firebasestorage.app",
            messagingSenderId: "686745242098",
            appId: "1:686745242098:web:a2612a5e2ea4f381e9836b",
            measurementId: "G-FRYK1VCS83"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colLista = collection(db, "lista_actual");
        const colHistorial = collection(db, "historial");

        // Estado de edición
        let idEdicion = null;

        window.cambiarTab = (tab) => {
            const secLista = document.getElementById('seccionLista');
            const secHistorial = document.getElementById('seccionHistorial');
            const barra = document.getElementById('barraInferior');
            const btnL = document.getElementById('tabLista');
            const btnH = document.getElementById('tabHistorial');
            if(tab === 'lista') {
                secLista.classList.remove('hidden'); secHistorial.classList.add('hidden'); barra.classList.remove('hidden');
                btnL.classList.add('tab-active'); btnH.classList.remove('tab-active');
            } else {
                secLista.classList.add('hidden'); secHistorial.classList.remove('hidden'); barra.classList.add('hidden');
                btnL.classList.remove('tab-active'); btnH.classList.add('tab-active');
            }
        };

        const limpiarInputs = () => {
            document.getElementById('nombre').value = '';
            document.getElementById('precio').value = '';
            document.getElementById('piezas').value = '';
            idEdicion = null;
            document.getElementById('btnAgregar').innerText = "Agregar a la lista";
            document.getElementById('btnAgregar').classList.replace('bg-orange-500', 'bg-blue-600');
            document.getElementById('btnCancelarEdicion').classList.add('hidden');
            document.getElementById('nombre').focus();
        };

        // --- BOTÓN AGREGAR / ACTUALIZAR ---
        document.getElementById('btnAgregar').addEventListener('click', async () => {
            const nombre = document.getElementById('nombre').value;
            const precio = parseFloat(document.getElementById('precio').value);
            const piezas = parseInt(document.getElementById('piezas').value);

            if(nombre && !isNaN(precio) && !isNaN(piezas)) {
                if(idEdicion) {
                    // MODO EDICIÓN
                    await updateDoc(doc(db, "lista_actual", idEdicion), { nombre, precio, piezas });
                } else {
                    // MODO NUEVO
                    await addDoc(colLista, { nombre, precio, piezas, creado: Date.now() });
                }
                limpiarInputs();
            }
        });

        document.getElementById('btnCancelarEdicion').addEventListener('click', limpiarInputs);

        // --- ESCUCHAR LISTA ACTUAL ---
        onSnapshot(colLista, (snapshot) => {
            let total = 0;
            const contenedor = document.getElementById('listaContenedor');
            contenedor.innerHTML = '';
            snapshot.docs.forEach(itemDoc => {
                const item = itemDoc.data();
                const subtotal = item.precio * item.piezas;
                total += subtotal;
                contenedor.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 flex justify-between items-center animate-fade-in">
                        <div class="cursor-pointer flex-1" onclick="prepararEdicion('${itemDoc.id}', '${item.nombre}', ${item.precio}, ${item.piezas})">
                            <p class="font-bold uppercase text-xs">${item.nombre} <span class="text-blue-400 text-[9px]">(Toca para editar)</span></p>
                            <p class="text-[10px] text-gray-400">${item.piezas} pzas x $${item.precio}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-black text-lg">$${subtotal.toFixed(2)}</span>
                            <button onclick="eliminarItem('${itemDoc.id}')" class="text-red-300 hover:text-red-500 p-2 text-xl">🗑️</button>
                        </div>
                    </div>`;
            });
            document.getElementById('totalCuenta').innerText = `$${total.toFixed(2)}`;
        });

        // --- PREPARAR EDICIÓN ---
        window.prepararEdicion = (id, nombre, precio, piezas) => {
            idEdicion = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('precio').value = precio;
            document.getElementById('piezas').value = piezas;
            document.getElementById('btnAgregar').innerText = "Actualizar Producto";
            document.getElementById('btnAgregar').classList.replace('bg-blue-600', 'bg-orange-500');
            document.getElementById('btnCancelarEdicion').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.eliminarItem = async (id) => { 
            if(confirm('¿Eliminar producto de la lista?')) {
                await deleteDoc(doc(db, "lista_actual", id)); 
            }
        };

        // --- ESCUCHAR HISTORIAL ---
        const qH = query(colHistorial, orderBy("timestamp", "desc"));
        onSnapshot(qH, (snapshot) => {
            const contenedorH = document.getElementById('historialContenedor');
            contenedorH.innerHTML = '';
            snapshot.docs.forEach(docSnap => {
                const c = docSnap.data();
                contenedorH.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow border border-gray-100">
                        <div class="flex justify-between items-start mb-2 border-b pb-2">
                            <div>
                                <span class="text-[9px] font-black text-gray-300 uppercase leading-none">${c.fecha}</span>
                                <div class="text-xl font-black text-blue-600">$${c.total.toFixed(2)}</div>
                            </div>
                            <button onclick="eliminarHistorial('${docSnap.id}')" class="text-red-400 hover:text-red-600 p-1">🗑️</button>
                        </div>
                        <details class="text-[11px] text-gray-500">
                            <summary class="cursor-pointer text-blue-400 font-bold">Ver productos</summary>
                            <ul class="mt-2 space-y-1 bg-gray-50 p-2 rounded-lg">${c.detalles.map(i => `<li>• ${i.piezas}x ${i.nombre} ($${i.precio})</li>`).join('')}</ul>
                        </details>
                    </div>`;
            });
        });

        window.eliminarHistorial = async (id) => {
            if(confirm('¿Eliminar compra del historial?')) await deleteDoc(doc(db, "historial", id));
        };

        document.getElementById('btnGuardarCompra').addEventListener('click', async () => {
            const snap = await getDocs(colLista);
            if(snap.empty) return;
            if(confirm('¿Guardar esta compra en el historial?')) {
                const items = snap.docs.map(d => d.data());
                const total = items.reduce((acc, curr) => acc + (curr.precio * curr.piezas), 0);
                await addDoc(colHistorial, {
                    fecha: new Date().toLocaleString('es-MX', { dateStyle: 'medium', timeStyle: 'short' }),
                    timestamp: Date.now(), total, detalles: items
                });
                const promesas = snap.docs.map(d => deleteDoc(doc(db, "lista_actual", d.id)));
                await Promise.all(promesas);
                limpiarInputs();
                alert("¡Compra guardada!");
            }
        });
    </script>
</body>
</html>
