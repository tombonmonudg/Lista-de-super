<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Familiar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-24">
    <div class="max-w-md mx-auto p-4">
        <h1 class="text-2xl font-bold text-center mb-6">🛒 Lista del Súper</h1>

        <div class="bg-white p-4 rounded-lg shadow-md mb-6">
            <input id="nombre" type="text" placeholder="Producto" class="w-full mb-2 p-2 border rounded">
            <div class="flex gap-2">
                <input id="precio" type="number" placeholder="$ Precio" class="w-1/2 p-2 border rounded">
                <input id="piezas" type="number" placeholder="Cant." class="w-1/2 p-2 border rounded">
            </div>
            <button id="btnAgregar" class="w-full mt-3 bg-blue-600 text-white py-2 rounded-lg">Agregar Item</button>
        </div>

        <div id="listaContenedor" class="space-y-3">
            </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center max-w-md mx-auto shadow-lg">
        <div>
            <p class="text-sm text-gray-500">Total estimado:</p>
            <p class="text-xl font-bold text-green-600" id="totalCuenta">$0.00</p>
        </div>
        <button id="btnGuardarCompra" class="bg-green-600 text-white px-6 py-2 rounded-full font-semibold">
            Guardar Compra
        </button>
    </div>

    <script type="module">
        // Importar Firebase (Sustituye con tu config)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs, query } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtZUWQzwes7Z9cmNwgKImUfJtlo3SJ-hg",
            authDomain: "lista-de-super-30116.firebaseapp.com",
            projectId: "lista-de-super-30116",
            storageBucket: "lista-de-super-30116.firebasestorage.app",
            messagingSenderId: "686745242098",
            appId: "1:686745242098:web:a2612a5e2ea4f381e9836b",
            measurementId: "G-FRYK1VCS83"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "lista_actual");

        // --- LÓGICA DE AGREGAR ---
        document.getElementById('btnAgregar').addEventListener('click', async () => {
            const nombre = document.getElementById('nombre').value;
            const precio = parseFloat(document.getElementById('precio').value);
            const piezas = parseInt(document.getElementById('piezas').value);

            if(nombre && precio && piezas) {
                await addDoc(colRef, { nombre, precio, piezas, fecha: Date.now() });
                document.getElementById('nombre').value = '';
                document.getElementById('precio').value = '';
                document.getElementById('piezas').value = '';
            }
        });

        // --- RENDERIZADO EN TIEMPO REAL ---
        onSnapshot(colRef, (snapshot) => {
            let total = 0;
            const contenedor = document.getElementById('listaContenedor');
            contenedor.innerHTML = '';

            snapshot.docs.forEach(itemDoc => {
                const item = itemDoc.data();
                const subtotal = item.precio * item.piezas;
                total += subtotal;

                contenedor.innerHTML += `
                    <div class="bg-white p-3 rounded shadow flex justify-between items-center">
                        <div>
                            <p class="font-bold">${item.nombre}</p>
                            <p class="text-sm text-gray-600">${item.piezas} pzas x $${item.precio}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold">$${subtotal}</span>
                            <button onclick="eliminarItem('${itemDoc.id}')" class="text-red-500 font-bold">X</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('totalCuenta').innerText = `$${total.toFixed(2)}`;
        });

        // Función para eliminar (se expone a window para el onclick del HTML)
        window.eliminarItem = async (id) => {
            await deleteDoc(doc(db, "lista_actual", id));
        };

        // --- GUARDAR COMPRA (HISTORIAL) ---
        document.getElementById('btnGuardarCompra').addEventListener('click', async () => {
            const snapshot = await getDocs(colRef);
            if(snapshot.empty) return alert("La lista está vacía");

            const items = snapshot.docs.map(d => d.data());
            const total = items.reduce((acc, curr) => acc + (curr.precio * curr.piezas), 0);

            // Guardar en historial
            await addDoc(collection(db, "historial"), {
                fecha: new Date().toLocaleString(),
                total: total,
                detalles: items
            });

            // Limpiar lista actual tras guardar
            snapshot.docs.forEach(async (d) => {
                await deleteDoc(doc(db, "lista_actual", d.id));
            });

            alert("Compra guardada en el historial");
        });
    </script>
</body>
</html>
